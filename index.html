<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 D Cafe – Fresh Fruit Salads</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --cream: #fdf6ec;
      --orange: #ff6b35;
      --deep: #1a0a00;
      --green: #3d8c40;
      --yellow: #ffc107;
      --pink: #ff4f7b;
      --gold: #e6a817;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--deep);
      overflow-x: hidden;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── NOTIFICATION BAR ── */
    .notif-bar {
      background: linear-gradient(90deg, var(--orange), var(--pink));
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }
    .bell { font-size:16px; flex-shrink:0; animation: ring 2s infinite; }
    @keyframes ring {
      0%,100%{transform:rotate(0)} 10%{transform:rotate(15deg)}
      20%{transform:rotate(-15deg)} 30%{transform:rotate(10deg)}
      40%{transform:rotate(-10deg)} 50%{transform:rotate(0)}
    }
    .notif-scroll {
      white-space: nowrap;
      animation: scroll-text 20s linear infinite;
      display: inline-block;
    }
    @keyframes scroll-text {
      0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)}
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(160deg,#fff3e0 0%,#ffe0b2 60%,#ffccbc 100%);
      padding: 20px 20px 0;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content:'';
      position:absolute;
      width:260px;height:260px;
      background:radial-gradient(circle,rgba(255,107,53,.18) 0%,transparent 70%);
      top:-60px;right:-60px;border-radius:50%;
    }

    /* LOGO ROW */
    .logo-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }
    .logo-img {
      height:72px;
      width:auto;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(255,107,53,.35);
      background:#3b3b3b;
      padding:4px 8px;
      object-fit:contain;
    }
    .tagline-box { text-align:right; }
    .tagline-box .tag1 {
      font-size:11px;font-weight:600;color:var(--orange);
      text-transform:uppercase;letter-spacing:1.5px;
    }
    .tagline-box .tag2 {
      font-family:'Playfair Display',serif;
      font-size:20px;font-weight:700;color:var(--deep);line-height:1.1;
    }
    .hero-text { margin-bottom:18px; }
    .hero-text h1 {
      font-family:'Playfair Display',serif;
      font-size:32px;font-weight:900;line-height:1.1;color:var(--deep);
    }
    .hero-text h1 span { color:var(--orange); }
    .hero-text p { margin-top:8px;font-size:13px;color:#6b4c2a;line-height:1.6; }
    .hero-fruits {
      display:flex;gap:10px;justify-content:center;
      font-size:44px;padding-bottom:20px;
      animation:float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
    }

    /* ── CONTACT BAR ── */
    .contact-bar {
      display:flex;gap:0;
      background:var(--deep);
    }
    .contact-btn {
      flex:1;
      display:flex;align-items:center;justify-content:center;
      gap:8px;
      padding:13px 8px;
      font-size:13px;font-weight:700;
      color:#fff;
      text-decoration:none;
      transition:background .2s;
    }
    .contact-btn:nth-child(1) { background:#25d366; border-right:1px solid rgba(255,255,255,.2); }
    .contact-btn:nth-child(2) { background:#ff6b35; border-right:1px solid rgba(255,255,255,.2); }
    .contact-btn:nth-child(3) { background:#4285F4; }
    .contact-btn:active { filter:brightness(.85); }
    .contact-btn i { font-size:18px; }

    /* ── SECTION ── */
    .section { padding:22px 16px; }
    .section-title {
      font-family:'Playfair Display',serif;
      font-size:22px;font-weight:700;
      margin-bottom:14px;
      display:flex;align-items:center;gap:8px;
    }
    .section-title span { color:var(--orange); }

    /* ── OFFERS ── */
    .offers-grid { display:flex;flex-direction:column;gap:12px; }
    .offer-card {
      background:linear-gradient(135deg,#fff5e0,#ffe9c8);
      border:1.5px solid #ffd59e;
      border-radius:16px;
      padding:14px;
      display:flex;align-items:center;gap:12px;
      box-shadow:0 3px 14px rgba(255,107,53,.1);
      position:relative;overflow:hidden;
    }
    .offer-icon { font-size:32px;flex-shrink:0; }
    .offer-text strong { display:block;font-size:14px;font-weight:700;color:var(--deep); }
    .offer-text span { font-size:12px;color:#8b5e2d; }
    .offer-badge {
      margin-left:auto;
      background:var(--orange);color:#fff;
      font-size:10px;font-weight:700;
      padding:4px 10px;border-radius:20px;
      white-space:nowrap;flex-shrink:0;
    }

    /* ── PLANS ── */
    .plans-section { padding:22px 16px 8px; }
    .plan-cards { display:flex;flex-direction:column;gap:20px; }
    .plan-card {
      border-radius:24px;
      padding:20px;
      position:relative;overflow:hidden;
      box-shadow:0 8px 30px rgba(0,0,0,.1);
      transition:transform .2s;
    }
    .plan-card:active { transform:scale(.98); }
    .plan-basic { background:linear-gradient(145deg,#e8f5e9,#c8e6c9); border:2px solid #a5d6a7; }
    .plan-regular { background:linear-gradient(145deg,#fff8e1,#ffe082); border:2px solid #ffd54f; }
    .plan-premium { background:linear-gradient(145deg,#1a0a00,#3e1f00); border:2px solid var(--gold); color:#fff; }

    .plan-ribbon {
      position:absolute;top:14px;right:-24px;
      background:var(--gold);color:var(--deep);
      font-size:10px;font-weight:800;
      padding:4px 32px;
      transform:rotate(35deg);letter-spacing:1px;
    }

    /* Plan fruit image */
    .plan-img {
      width:100%;height:160px;
      border-radius:16px;
      object-fit:cover;
      margin-bottom:14px;
      display:block;
    }

    .plan-name {
      font-family:'Playfair Display',serif;
      font-size:22px;font-weight:900;margin-bottom:4px;
    }
    .plan-basic .plan-name { color:var(--green); }
    .plan-regular .plan-name { color:#b8860b; }
    .plan-premium .plan-name { color:var(--gold); }

    .plan-price { font-size:40px;font-weight:800;line-height:1;margin:8px 0; }
    .plan-basic .plan-price { color:var(--green); }
    .plan-regular .plan-price { color:#b8860b; }
    .plan-premium .plan-price { color:var(--gold); }
    .plan-price sup { font-size:20px;vertical-align:top;margin-top:8px; }

    .plan-desc { font-size:13px;margin-bottom:14px;line-height:1.6; }
    .plan-basic .plan-desc { color:#2e7d32; }
    .plan-regular .plan-desc { color:#795548; }
    .plan-premium .plan-desc { color:#e0cba8; }

    .plan-features { list-style:none;margin-bottom:18px; }
    .plan-features li {
      font-size:13px;padding:5px 0;
      display:flex;align-items:center;gap:8px;
      border-bottom:1px solid rgba(0,0,0,.07);
    }
    .plan-premium .plan-features li { border-bottom-color:rgba(255,255,255,.1);color:#f5e6c8; }
    .plan-features li:last-child { border-bottom:none; }

    .plan-btn {
      display:block;width:100%;padding:14px;
      border:none;border-radius:14px;
      font-size:15px;font-weight:700;
      cursor:pointer;letter-spacing:.5px;
      transition:transform .15s,box-shadow .15s;
    }
    .plan-btn:active { transform:scale(.97); }
    .plan-basic .plan-btn { background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(61,140,64,.4); }
    .plan-regular .plan-btn { background:#e6a817;color:var(--deep);box-shadow:0 4px 14px rgba(230,168,23,.4); }
    .plan-premium .plan-btn { background:linear-gradient(135deg,var(--gold),#c97b22);color:var(--deep);box-shadow:0 4px 18px rgba(230,168,23,.5); }

    .plan-premium::before {
      content:'';position:absolute;top:-50%;left:-50%;
      width:200%;height:200%;
      background:linear-gradient(45deg,transparent 40%,rgba(255,215,0,.08) 50%,transparent 60%);
      animation:shimmer 3s infinite;
    }
    @keyframes shimmer {
      0%{transform:translateX(-100%) rotate(45deg)}
      100%{transform:translateX(100%) rotate(45deg)}
    }

    /* ── ADDRESS SECTION ── */
    .address-section {
      background:linear-gradient(135deg,#fff8ee,#ffecd2);
      margin:0 16px 20px;
      border-radius:20px;
      padding:18px;
      border:1.5px solid #ffd59e;
      display:flex;align-items:flex-start;gap:14px;
    }
    .address-icon {
      width:46px;height:46px;
      background:var(--orange);
      border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      font-size:22px;
      box-shadow:0 4px 12px rgba(255,107,53,.35);
    }
    .address-text strong { display:block;font-size:15px;font-weight:700;color:var(--deep);margin-bottom:3px; }
    .address-text span { font-size:13px;color:#8b5e2d;line-height:1.5; }
    .address-link {
      display:inline-flex;align-items:center;gap:5px;
      margin-top:8px;
      background:var(--orange);color:#fff;
      font-size:12px;font-weight:700;
      padding:6px 14px;border-radius:20px;
      text-decoration:none;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
      z-index:999;align-items:flex-end;justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--cream);border-radius:28px 28px 0 0;
      padding:26px 22px 40px;width:100%;max-width:480px;
      animation:slideUp .3s ease;
    }
    @keyframes slideUp {
      from{transform:translateY(100%)} to{transform:translateY(0)}
    }
    .modal h2 { font-family:'Playfair Display',serif;font-size:21px;margin-bottom:6px; }
    .modal p { font-size:13px;color:#6b4c2a;margin-bottom:18px; }
    .modal-close { float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#999; }
    .modal-input {
      width:100%;padding:13px 15px;
      border:1.5px solid #e0c8a0;border-radius:12px;
      font-family:'DM Sans',sans-serif;font-size:14px;
      background:#fff;margin-bottom:12px;outline:none;
    }
    .modal-input:focus { border-color:var(--orange); }
    .modal-submit {
      width:100%;padding:15px;
      background:linear-gradient(135deg,var(--orange),var(--pink));
      color:#fff;border:none;border-radius:14px;
      font-size:15px;font-weight:700;cursor:pointer;
      box-shadow:0 6px 20px rgba(255,107,53,.4);
      display:flex;align-items:center;justify-content:center;gap:10px;
    }

    /* ── FOOTER ── */
    footer {
      background:var(--deep);color:#e0c8a0;
      text-align:center;padding:26px 16px;font-size:13px;
    }
    .footer-logo-img {
      height:55px;width:auto;
      object-fit:contain;margin-bottom:10px;
      background:#3b3b3b;border-radius:10px;padding:3px 8px;
    }
    footer p { margin:4px 0; }
    footer .socials {
      margin:14px 0;font-size:22px;
      display:flex;gap:16px;justify-content:center;
    }
    footer a { color:var(--gold);text-decoration:none; }

    /* ── TOAST ── */
    .toast {
      position:fixed;bottom:28px;left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--green);color:#fff;
      padding:12px 22px;border-radius:40px;
      font-size:13px;font-weight:600;z-index:9999;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.2);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ── LIVE TAB ── */
    .live-tab {
      position:fixed;top:50%;right:0;
      transform:translateY(-50%);
      background:linear-gradient(180deg,var(--orange),var(--pink));
      color:#fff;writing-mode:vertical-rl;
      font-size:11px;font-weight:700;letter-spacing:2px;
      padding:18px 8px;border-radius:12px 0 0 12px;
      cursor:pointer;z-index:100;
      display:flex;flex-direction:column;align-items:center;gap:6px;
      box-shadow:-3px 0 16px rgba(255,107,53,.4);
    }
    .live-dot {
      width:8px;height:8px;background:#fff;border-radius:50%;
      animation:pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)}
    }
  </style>
</head>
